[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
REACT_APP_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}/api"
REACT_APP_SUPABASE_URL = "${{SUPABASE_URL}}"
REACT_APP_SUPABASE_ANON_KEY = "${{SUPABASE_ANON_KEY}}"
