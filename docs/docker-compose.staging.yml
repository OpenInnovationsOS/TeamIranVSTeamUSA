# Docker Compose for Staging Environment
# Used for CI/CD pipeline and staging deployment

version: '3.8'

services:
  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    container_name: team-iran-vs-usa-staging-app
    restart: unless-stopped
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=team_iran_vs_usa_staging
      - DB_USER=postgres
      - DB_PASSWORD=${STAGING_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${STAGING_JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${STAGING_TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=info
      - ANALYTICS_ENABLED=true
      - SENTRY_DSN=${STAGING_SENTRY_DSN}
    volumes:
      - ./logs:/var/log/team-iran-vs-usa
      - ./uploads:/var/www/uploads
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: team-iran-vs-usa-staging-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=team_iran_vs_usa_staging
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${STAGING_DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: team-iran-vs-usa-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${STAGING_REDIS_PASSWORD}
    volumes:
      - redis_staging_data:/data
    ports:
      - "6379:6379"
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: team-iran-vs-usa-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./ssl/staging:/etc/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - ./dist/static:/var/www/team-iran-vs-usa/static:ro
    depends_on:
      - app
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: team-iran-vs-usa-staging-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_staging_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - staging-network

  grafana:
    image: grafana/grafana:latest
    container_name: team-iran-vs-usa-staging-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${STAGING_GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - staging-network

  # Test Data Seeder
  seeder:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    container_name: team-iran-vs-usa-staging-seeder
    environment:
      - NODE_ENV=staging
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=team_iran_vs_usa_staging
      - DB_USER=postgres
      - DB_PASSWORD=${STAGING_DB_PASSWORD}
    depends_on:
      - postgres
    networks:
      - staging-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 10 &&
        node scripts/seed-prod.js seed
      "
    profiles:
      - seeder

  # Performance Testing
  artillery:
    image: artilleryio/artillery:latest
    container_name: team-iran-vs-usa-staging-artillery
    volumes:
      - ./tests/performance:/tests
    depends_on:
      - app
    networks:
      - staging-network
    command: >
      sh -c "
        echo 'Waiting for application...' &&
        sleep 30 &&
        artillery run tests/load-test.yml --target http://app:3000
      "
    profiles:
      - performance

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  prometheus_staging_data:
    driver: local
  grafana_staging_data:
    driver: local

networks:
  staging-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
