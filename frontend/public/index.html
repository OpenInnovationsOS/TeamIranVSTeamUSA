<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Team Iran vs Team USA - Telegram Mini Game" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:; font-src 'self' data:;">
    
    <!-- Telegram WebApp SDK with fallback -->
    <script>
      // Try to load Telegram WebApp SDK
      var script = document.createElement('script');
      script.src = 'https://telegram.org/js/telegram-web-app.js';
      script.onload = function() {
        console.log('Telegram WebApp SDK loaded successfully');
      };
      script.onerror = function() {
        console.log('Telegram WebApp SDK failed to load, using fallback');
        // Create fallback Telegram object
        window.Telegram = {
          WebApp: {
            ready: function() {},
            expand: function() {},
            setHeaderColor: function() {},
            setBackgroundColor: function() {},
            enableClosingConfirmation: function() {},
            MainButton: {
              setText: function() {},
              show: function() {},
              hide: function() {},
              onClick: function() {},
              offClick: function() {}
            },
            BackButton: {
              show: function() {},
              hide: function() {},
              onClick: function() {},
              offClick: function() {}
            },
            HapticFeedback: {
              impactOccurred: function() {},
              notificationOccurred: function() {}
            },
            showAlert: function(message, callback) {
              alert(message);
              if (callback) callback();
            },
            showConfirm: function(message, callback) {
              const result = confirm(message);
              if (callback) callback(result);
            },
            openLink: function(url) {
              window.open(url, '_blank');
            },
            openTelegramLink: function(url) {
              window.open(url, '_blank');
            },
            initDataUnsafe: {
              user: {
                id: Math.floor(Math.random() * 1000000) + 100000,
                username: 'Player' + Math.floor(Math.random() * 10000),
                first_name: 'Test',
                last_name: 'User'
              }
            }
          }
        };
      };
      document.head.appendChild(script);
    </script>
    
    <title>Team Iran vs Team USA</title>
    
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #0a0a0a;
        color: #ffffff;
        overflow-x: hidden;
      }
      
      * {
        box-sizing: border-box;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 18px;
        color: #ffffff;
      }
      
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top: 3px solid #ffffff;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        Loading game...
      </div>
    </div>
  </body>
</html>
