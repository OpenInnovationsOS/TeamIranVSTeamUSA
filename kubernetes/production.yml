# Kubernetes Configuration for Team Iran vs USA
# Production-ready Kubernetes manifests with auto-scaling

apiVersion: v1
kind: Namespace
metadata:
  name: team-iran-vs-usa
  labels:
    name: team-iran-vs-usa
    environment: production

---
# Secret for environment variables
apiVersion: v1
kind: Secret
metadata:
  name: team-iran-vs-usa-secrets
  namespace: team-iran-vs-usa
type: Opaque
data:
  # Base64 encoded values
  db-password: <base64-encoded-password>
  jwt-secret: <base64-encoded-jwt-secret>
  telegram-bot-token: <base64-encoded-telegram-token>
  webhook-secret: <base64-encoded-webhook-secret>

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: team-iran-vs-usa-config
  namespace: team-iran-vs-usa
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_TYPE: "postgres"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "team_iran_vs_usa"
  DB_USER: "postgres"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  TELEGRAM_WEBHOOK_URL: "https://yourdomain.com/api/telegram/webhook"
  APP_URL: "https://yourdomain.com"
  API_URL: "https://yourdomain.com/api"

---
# Persistent Volume Claim for database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: team-iran-vs-usa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd

---
# Persistent Volume Claim for Redis
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: team-iran-vs-usa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: team-iran-vs-usa
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: team-iran-vs-usa-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: team-iran-vs-usa-config
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: team-iran-vs-usa-secrets
              key: db-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 20Gi

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: team-iran-vs-usa
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - --requirepass
        - "$(REDIS_PASSWORD)"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: team-iran-vs-usa-secrets
              key: redis-password
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 5Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: team-iran-vs-usa
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
  type: ClusterIP

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: team-iran-vs-usa
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
  type: ClusterIP

---
# Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-iran-vs-usa
  namespace: team-iran-vs-usa
  labels:
    app: team-iran-vs-usa
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-iran-vs-usa
  template:
    metadata:
      labels:
        app: team-iran-vs-usa
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - team-iran-vs-usa
              topologyKey: kubernetes.io/hostname
      containers:
      - name: team-iran-vs-usa
        image: your-registry/team-iran-vs-usa:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: team-iran-vs-usa-config
        - secretRef:
            name: team-iran-vs-usa-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: shared-storage
          mountPath: /app/shared
      imagePullSecrets:
        - name: registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        capabilities:
          drop:
            - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
      - name: shared-storage
        emptyDir: {}

---
# Application Service
apiVersion: v1
kind: Service
metadata:
  name: team-iran-vs-usa-service
  namespace: team-iran-vs-usa
spec:
  selector:
    app: team-iran-vs-usa
  ports:
    - port: 80
      targetPort: 3000
      name: http
    - port: 443
      targetPort: 3000
      name: https
  type: LoadBalancer
  sessionAffinity: ClientIP
  externalTrafficPolicy: Local

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: team-iran-vs-usa-hpa
  namespace: team-iran-vs-usa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: team-iran-vs-usa
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: team-iran-vs-usa-netpol
  namespace: team-iran-vs-usa
spec:
  podSelector:
    matchLabels:
      app: team-iran-vs-usa
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              name: kube-system
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: team-iran-vs-usa
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to: []
        ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to: []
        ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: team-iran-vs-usa-pdb
  namespace: team-iran-vs-usa
spec:
  minAvailable: 1
  maxUnavailable: 1
  selector:
    matchLabels:
      app: team-iran-vs-usa

---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-iran-vs-usa-quota
  namespace: team-iran-vs-usa
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services: "10"
    services.loadbalancers: "5"
    count/secrets: "10"
    count/configmaps: "10"

---
# Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: team-iran-vs-usa-limits
  namespace: team-iran-vs-usa
spec:
  limits:
    - default:
        min:
          memory: "128Mi"
          cpu: "100m"
        max:
          memory: "2Gi"
          cpu: "2000m"
        type: Container
    - defaultRequest:
        min:
          memory: "64Mi"
          cpu: "50m"
        max:
          memory: "1Gi"
          cpu: "1000m"
        type: Container

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-iran-vs-usa-sa
  namespace: team-iran-vs-usa
  annotations:
    iam.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/team-iran-vs-usa-k8s-role

---
# Cluster Role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-iran-vs-usa-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
# Cluster Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: team-iran-vs-usa-binding
subjects:
- kind: ServiceAccount
  name: team-iran-vs-usa-sa
  namespace: team-iran-vs-usa
roleRef:
  kind: ClusterRole
  name: team-iran-vs-usa-role

---
# Ingress Controller (NGINX)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-iran-vs-usa-ingress
  namespace: team-iran-vs-usa
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - yourdomain.com
    - www.yourdomain.com
    secretName: team-iran-vs-usa-tls
  rules:
  - host: yourdomain.com
    http:
      paths:
      - path: /api
        backend:
          serviceName: team-iran-vs-usa-service
          servicePort: 80
      - path: /
        backend:
          serviceName: team-iran-vs-usa-service
          servicePort: 80
  - host: www.yourdomain.com
    http:
      paths:
      - path: /api
        backend:
          serviceName: team-iran-vs-usa-service
          servicePort: 80
      - path: /
        backend:
          serviceName: team-iran-vs-usa-service
          servicePort: 80

---
# ConfigMap for NGINX
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: team-iran-vs-usa
data:
  default.conf: |
    upstream backend {
        server team-iran-vs-usa-service:80 max_fails=3 fail_timeout=30s;
    }
    
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        
        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;
        
        # Location blocks
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $cookie_nocache;
        }
        
        location / {
            limit_req zone=static burst=50 nodelay;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "HIT";
            try_files $uri $uri/ @fallback;
        }
        
        location @fallback {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Block common exploit patterns
        location ~* \.(aspx|php|jsp|cgi|asp|pl)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

---
# Service Monitor for custom metrics
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: team-iran-vs-usa-metrics
  namespace: team-iran-vs-usa
  labels:
    app: team-iran-vs-usa
spec:
  selector:
    matchLabels:
      app: team-iran-vs-usa
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
