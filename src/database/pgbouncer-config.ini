# PgBouncer Configuration for Gaming Workloads
# Team Iran vs Team USA - High-Performance Connection Pooling

[pgbouncer]

# ============================================================================
# BASIC CONFIGURATION
# ============================================================================

# Listen address for client connections
listen_addr = 127.0.0.1
listen_port = 6432

# PostgreSQL server connection
host = localhost
port = 5432
user = postgres
password = 
database = team_iran_vs_usa

# ============================================================================
# POOLING CONFIGURATION
# ============================================================================

# Pool mode for gaming workloads
# session: One server connection per client connection
# transaction: One server connection per transaction
# statement: One server connection per statement (best for high concurrency)
pool_mode = transaction

# Connection pool sizes
# Default pool size (per user/database combination)
default_pool_size = 20

# Minimum pool size (always maintained)
min_pool_size = 5

# Maximum pool size (hard limit)
max_pool_size = 100

# Reserve connections for superusers
reserve_pool_size = 5

# Connection lifetime (seconds)
# Reset connections after this time to prevent long-running connection issues
server_lifetime = 3600

# Client idle timeout (seconds)
# Disconnect clients idle for this long
server_idle_timeout = 600

# ============================================================================
# GAMING-SPECIFIC SETTINGS
# ============================================================================

# Maximum number of client connections
max_client_conn = 1000

# Automatic failover to replica servers for read queries
# Configure read replicas for gaming analytics
# Note: This requires additional configuration in databases section

# Query timeout (seconds)
query_timeout = 30

# Query wait timeout (seconds)
# How long to wait for a free connection
query_wait_timeout = 5

# ============================================================================
# TRANSACTION CONTROL
# ============================================================================

# Transaction timeout (seconds)
# Abort transactions running longer than this
transaction_timeout = 300

# Idle transaction timeout (seconds)
# Abort transactions idle for this long
idle_transaction_timeout = 60

# Track client connections across server restarts
track_extra_parameters = true

# ============================================================================
# AUTHENTICATION AND SECURITY
# ============================================================================

# Authentication type
auth_type = md5

# Enable TLS/SSL (uncomment for production)
# client_tls_sslmode = require
# server_tls_sslmode = require

# Admin users for PgBouncer management
admin_users = postgres
stats_users = stats

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Log destination
# syslog: System log
# stderr: Standard error
# file: Log file
logging_dest = stderr

# Log level
# 0: Minimal logging
# 1: Basic logging
# 2: Verbose logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Log file path (if logging to file)
# log_file = /var/log/pgbouncer/pgbouncer.log

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# TCP keepalive
tcp_keepalive = 1

# TCP keepalive idle time (seconds)
tcp_keepidle = 60

# TCP keepalive interval (seconds)
tcp_keepintvl = 10

# TCP keepalive count
tcp_keepcnt = 3

# Receive buffer size
recv_buf_size = 8192

# Send buffer size
send_buf_size = 8192

# ============================================================================
# DATABASE CONFIGURATION (FOR READ REPLICAS)
# ============================================================================

[databases]

# Primary database (write operations)
team_iran_vs_usa = host=localhost port=5432 user=postgres

# Read replica 1 (read operations)
team_iran_vs_usa_replica1 = host=replica1.example.com port=5432 user=postgres

# Read replica 2 (read operations)
team_iran_vs_usa_replica2 = host=replica2.example.com port=5432 user=postgres

# Read replica 3 (read operations)
team_iran_vs_usa_replica3 = host=replica3.example.com port=5432 user=postgres

# ============================================================================
# USERS CONFIGURATION
# ============================================================================

[users]

# Application user with password hash
# Generate with: pgbouncer -k -u username
postgres = md5a1b2c3d4e5f6

# Stats user for monitoring
stats = md5stats_password_hash

# ============================================================================
# ADVANCED FEATURES
# ============================================================================

# Enable automatic server reset
# Helps prevent connection bloat
server_reset_query = DISCARD ALL

# Application name prefix
# Helps identify connections in monitoring
application_name_add_host = 1

# Auto-detect failover
# Automatically switch to replica if primary fails
autodb_idle_timeout = 3600

# Maximum prepared statement cache size
max_prepared_statements = 1000

# ============================================================================
# MONITORING AND STATS
# ============================================================================

# Enable statistics collection
stats_period = 60

# Show detailed stats in show pools command
show_pool_stats = 1

# Show detailed application stats
show_application_stats = 1

# ============================================================================
# PRODUCTION OPTIMIZATIONS
# ============================================================================

# Uncomment these for production deployment:

# Disable DNS lookups for better performance
# dns_nxdomain_cache = 3600
# dns_nxdomain_ttl = 3600

# Enable connection throttling
# max_packet_size = 2048

# Optimize for high concurrency
# pkt_buf = 4096
# max_packet_size = 4096

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================

# For development, you might want:
# - Lower pool sizes
# - More verbose logging
# - Shorter timeouts

# Uncomment for development:
# default_pool_size = 10
# max_client_conn = 100
# log_connections = 2
# log_disconnections = 2
# log_pooler_errors = 2
